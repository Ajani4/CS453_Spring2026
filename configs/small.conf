# configs/small.conf
# Configuration for small graph (~50 nodes)
# Used by tools/graph_export/run.sh (and run.bat on Windows)

# Path to the NetGameSim .dot file for this graph
# Generated by: cd netgamesim && java ... -jar target/scala-3.2.2/netmodelsim.jar small
dot_file = outputs/small.ngs.dot

# Random seed for reproducibility
seed = 42

# Make edges undirected to guarantee connectivity
directed = false
